name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - 'feat/**'     # auto-pr.yml opens PRs with GITHUB_TOKEN, which GitHub blocks from
                      # firing `pull_request` workflows — so we run CI on feat pushes too.
                      # in-test.yml keys off this run finishing green (workflow_run).

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Lint · Build
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode <XCODE_VERSION>
        run: sudo xcode-select -s /Applications/Xcode_<XCODE_VERSION>.app/Contents/Developer

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # === USER CUSTOM START ===
      # Add project-specific setup steps here. The skill preserves anything between these markers on update.
      # === USER CUSTOM END ===

      - name: Lint
        run: |
          if command -v swiftlint > /dev/null 2>&1; then
            <LINT_COMMAND>
          else
            echo "::notice::swiftlint not installed on runner; skipping lint. Install via 'brew install swiftlint' on macos-latest if needed."
          fi

      # Build-only merge gate — proves the app compiles for the iOS Simulator. Simulator tests are NOT
      # run in CI: ephemeral runners have no iOS simulator runtime pre-installed, so `xcodebuild test`
      # silently downloads a multi-GB runtime (~10 min) on EVERY run (never cached; the OS pin is
      # irrelevant — it downloads either way). In this pipeline tests run locally — dev-story-implementer's
      # Phase D + the In-Test simulator launch — so re-running them in CI is slow and redundant. A
      # `generic/platform=iOS Simulator` destination resolves no concrete device, so it needs no runtime
      # and stays ~90s. (To gate on tests anyway — e.g. a runner with the runtime baked in — add a Test
      # step here running the Verified test command; expect the runtime download on bare runners.)
      - name: Build
        run: xcodebuild build -scheme <SCHEME> -destination 'generic/platform=iOS Simulator'
