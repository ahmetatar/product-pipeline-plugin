name: TestFlight (manual upload)

# Distribution role for iOS — runs ONLY when you explicitly request it (workflow_dispatch from the
# Actions tab or `gh workflow run testflight.yml`). It is NOT triggered by pushes, PRs, story
# transitions, or main merges. Builds a signed app-store-export and uploads it to TestFlight via
# `pilot` (no auto-submission, internal testers only). This is the deliberate "ship a build to real
# devices" button; day-to-day In-Test verification is the separate simulator build in `in-test.yml`.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (defaults to the workflow ref)'
        required: false
        default: ''
      pr_number:
        description: 'PR number to comment on after upload (optional)'
        required: false
        default: ''
      story_id:
        description: 'Story ID being shipped, e.g. F-001/S-03 (optional, for log)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write   # the post-upload step comments on the PR via github-script

concurrency:
  group: testflight-${{ github.event.inputs.branch || github.ref }}
  cancel-in-progress: false

jobs:
  beta:
    name: Build · Upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Select Xcode <XCODE_VERSION>
        run: sudo xcode-select -s /Applications/Xcode_<XCODE_VERSION>.app/Contents/Developer

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}

      # === USER CUSTOM START ===
      # Add project-specific pre-build steps here.
      # === USER CUSTOM END ===

      - name: Run beta lane (match read-only · build · pilot upload)
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: bundle exec fastlane beta

      - name: Comment on PR with TestFlight upload notice
        if: ${{ github.event.inputs.pr_number != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const storyId = '${{ github.event.inputs.story_id }}';
            const storyLine = storyId ? `\n**Story:** ${storyId}` : '';
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt('${{ github.event.inputs.pr_number }}', 10),
              body: `🚀 **TestFlight build uploaded.**${storyLine}\n\nApple processing typically takes 5–30 minutes. You'll get a TestFlight notification on your device when it's ready to install.\n\nRun ID: ${context.runId}`
            })
