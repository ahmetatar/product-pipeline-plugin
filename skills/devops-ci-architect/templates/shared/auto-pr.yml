name: Auto-PR

# On every push to a feat/** branch: open a PR if none is open yet. That's all — the board is
# already at In-Progress (dev-story-implementer sets it when it starts the story); CI moves it to
# In-Test on green. This workflow exists so dev-story-implementer ends at `git push`, not `gh pr
# create`. Stack-agnostic: no placeholders.

on:
  push:
    branches: ['feat/**']

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open PR if missing
        env:
          # Prefer the board PAT (PROJECTS_TOKEN). The default GITHUB_TOKEN is blocked from
          # opening PRs by the "Allow GitHub Actions to create and approve pull requests" org
          # setting, AND a GITHUB_TOKEN-authored PR does not get its `Closes #N` linked to the
          # issue (closingIssuesReferences stays empty) — so the issue neither auto-closes on
          # merge nor lets in-test.yml find the story to move the board. A PAT-authored PR fixes
          # both. Falls back to GITHUB_TOKEN for projects with no board automation.
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          # Already an open PR for this branch? Nothing to do.
          if gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            echo "PR already open for $BRANCH — skipping."
            exit 0
          fi
          # Title + body come from the HEAD commit — dev-story-implementer's story
          # commit, which carries `Closes #N`. We deliberately do NOT use
          # `gh pr create --fill`: on a MULTI-COMMIT branch --fill ignores commit
          # messages — it humanizes the branch name into the title and drops the
          # `Closes #N` footer from the body, so the issue never links (no auto-close
          # on merge, and in-test.yml can't find the story to move the board). On a
          # single-commit branch this is identical to the old --fill behavior.
          TITLE=$(git log -1 --format=%s)
          BODY=$(git log -1 --format=%b)
          gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY"
